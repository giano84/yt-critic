<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YT Critic — Analyzing...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 500px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #222;
    }
    .header h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .header .tagline { font-size: 11px; color: #888; margin-top: 2px; }

    /* Loader */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 40px 0;
      text-align: center;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #333;
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 14px; color: #aaa; }
    .loader-sub  { font-size: 12px; color: #555; }
    .loader-url  { font-size: 11px; color: #444; word-break: break-all; max-width: 400px; }

    /* Result */
    .result { display: none; flex: 1; flex-direction: column; }
    .result.visible { display: flex; }

    .result-title {
      font-size: 14px; font-weight: 700; color: #fff;
      margin-bottom: 12px; line-height: 1.4;
    }
    .result-body {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px;
      flex: 1;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.65;
      color: #ccc;
    }
    .result-body h2 {
      font-size: 13px; font-weight: 700; color: #fff;
      margin: 14px 0 6px; padding-bottom: 4px;
      border-bottom: 1px solid #2a2a2a;
    }
    .result-body h2:first-child { margin-top: 0; }
    .result-body p  { margin-bottom: 6px; }
    .result-body ul { padding-left: 16px; margin-bottom: 6px; }
    .result-body li { margin-bottom: 4px; }
    .result-body strong { color: #e8e8e8; }
    .badge-ok   { color: #4caf50; }
    .badge-warn { color: #ff9800; }
    .badge-err  { color: #f44336; }

    .actions {
      display: flex; gap: 10px;
      margin-top: 14px; flex-shrink: 0;
    }
    .btn {
      flex: 1; padding: 10px;
      border-radius: 7px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid #333;
      background: #1a1a1a; color: #aaa;
      transition: background .15s, color .15s;
    }
    .btn:hover { background: #2a2a2a; color: #fff; }
    .btn.primary {
      background: #ff0000; border-color: #ff0000; color: #fff;
    }
    .btn.primary:hover { background: #cc0000; border-color: #cc0000; }

    /* Error */
    .error-box {
      display: none;
      background: #1a0a0a; border: 1px solid #4a1a1a;
      border-radius: 8px; padding: 14px;
      font-size: 13px; color: #ff8080; line-height: 1.5;
    }
    .error-box.visible { display: block; }

    .quota { font-size: 11px; color: #555; margin-top: 12px; text-align: right; }
  </style>
</head>
<body>

<div class="header">
  <div>🎯</div>
  <div>
    <h1>YT Critic</h1>
    <div class="tagline">Critical analysis with fact-checking</div>
  </div>
</div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-text" id="loaderText">Downloading transcript...</div>
  <div class="loader-sub">Fact-checking takes 1–2 minutes — you can minimize this window</div>
  <div class="loader-url" id="loaderUrl"></div>
</div>

<div class="error-box" id="errorBox"></div>

<div class="result" id="result">
  <div class="result-title" id="resultTitle"></div>
  <div class="result-body" id="resultBody"></div>
  <div class="actions">
    <button class="btn" id="btnCopy">📋 Copy text</button>
    <button class="btn primary" id="btnClose">Close window</button>
  </div>
  <div class="quota" id="quota"></div>
</div>

<script src="analysis.js"></script>
</body>
</html>

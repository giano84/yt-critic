<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YT Critic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 16px;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header .tagline { font-size: 11px; color: #888; margin-top: 2px; }
    .quota { margin-left: auto; font-size: 11px; color: #555; text-align: right; }
    .quota span { color: #e8e8e8; font-weight: 600; }

    .url-box {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 10px 12px; margin-bottom: 12px;
    }
    .url-label { font-size: 10px; color: #555; margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 0.6px; }
    #urlText { font-size: 12px; color: #aaa; word-break: break-all; }
    .url-box.no-video #urlText { color: #555; font-style: italic; }

    .btn {
      width: 100%; padding: 10px;
      border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      background: #ff0000; color: #fff; transition: background .15s;
    }
    .btn:hover:not(:disabled) { background: #cc0000; }
    .btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    .footer-note { font-size: 10px; color: #333; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>

<div class="header">
  <div>🎯</div>
  <div>
    <h1>YT Critic</h1>
    <div class="tagline">Critical analysis · Fact-checking</div>
  </div>
  <div class="quota"><span id="quotaRemaining">—</span> analyses left</div>
</div>

<div class="url-box" id="urlBox">
  <div class="url-label">Video</div>
  <div id="urlText">Open a YouTube video to use YT Critic</div>
</div>

<button class="btn" id="btnAnalyze" disabled>🎯 Analyze &amp; Fact-check</button>
<div class="footer-note">Powered by Claude AI · no personal data collected</div>

<script src="popup.js"></script>
</body>
</html>
